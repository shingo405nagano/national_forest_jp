    森林管理局:
      ja: 森林管理局
      en: authority
    森林管理署:
      ja: 森林管理署
      en: office
    担当区:
      ja: 担当区
      en: branch_office
    国有林名:
      ja: 国有林名
      en: locality
    林班主番:
      ja: 林班主番
      en: main_address
    林班枝番: 
      ja: 林班枝番
