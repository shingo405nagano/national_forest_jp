    dtype: String
    default: "-"
  森林管理局:
    ja: 森林管理局ID
    en: authority_id
    dtype: String
    default: "-"
  森林管理署:
    ja: 森林管理署ID
    en: office_id
    dtype: String
    default: "-"
  路線番号:
    ja: 路線番号
    en: route_number
    dtype: Integer
    default: -1
  林道名:
    ja: 林道名
    en: road_name
    dtype: String
    default: "-"
  geometry:
    ja: geometry
    en: geometry
    dtype: Geometry
    default: null
